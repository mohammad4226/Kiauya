<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ديوان الأشعار</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Droid Arabic Naskh', 'Traditional Arabic', serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
        }

        header p {
            font-size: 18px;
            opacity: 0.9;
            font-style: italic;
        }

        .poems-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .poem-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            border-right: 5px solid #2a5298;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .poem-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(42, 82, 152, 0.1) 0%, rgba(42, 82, 152, 0) 100%);
            pointer-events: none;
        }

        .poem-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border-right-color: #ff6b6b;
        }

        .poem-title {
            font-size: 24px;
            color: #2a5298;
            margin-bottom: 15px;
            font-weight: bold;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .poem-poet {
            color: #999;
            font-size: 14px;
            margin-bottom: 20px;
            font-style: italic;
        }

        .poem-content {
            line-height: 2;
            font-size: 16px;
            color: #555;
            text-align: right;
            margin-bottom: 15px;
            max-height: 200px;
            overflow: hidden;
            position: relative;
        }

        .poem-content.expanded {
            max-height: none;
        }

        .poem-content::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            left: 0;
            height: 40px;
            background: linear-gradient(transparent, white);
            pointer-events: none;
        }

        .poem-content.expanded::after {
            display: none;
        }

        .read-more {
            color: #2a5298;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            margin-top: 10px;
            transition: color 0.3s ease;
        }

        .read-more:hover {
            color: #ff6b6b;
        }

        .poem-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
            font-size: 13px;
            color: #999;
        }

        .poem-category {
            display: inline-block;
            background: #e3f2fd;
            color: #2a5298;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .add-poem-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-poem-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 28px;
            color: #2a5298;
            margin-bottom: 25px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            color: #999;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: #ff6b6b;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Droid Arabic Naskh', 'Traditional Arabic', serif;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Droid Arabic Naskh', 'Traditional Arabic', serif;
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-cancel {
            background: #e0e0e0;
            color: #333;
        }

        .btn-cancel:hover {
            background: #d0d0d0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state h2 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .empty-state p {
            font-size: 18px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 32px;
            }

            .poems-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .add-poem-btn {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
                font-size: 24px;
            }

            .modal-content {
                padding: 25px;
            }
        }

        .stats {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat-item {
            color: white;
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌙 ديوان أشعاري</h1>
            <p>مجموعة من أجمل الأبيات والقصائد</p>
        </header>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="poemCount">0</div>
                <div class="stat-label">قصيدة</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="verseCount">0</div>
                <div class="stat-label">بيت شعر</div>
            </div>
        </div>

        <div class="poems-grid" id="poemsGrid">
            <!-- القصائد ستظهر هنا -->
        </div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <h2>لا توجد قصائد بعد</h2>
            <p>اضغط على الزر (+) لإضافة أول قصيدة</p>
        </div>
    </div>

    <button class="add-poem-btn" onclick="openModal()">+</button>

    <div class="modal" id="poemModal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="close-btn" onclick="closeModal()">×</button>
                <span>إضافة قصيدة جديدة</span>
            </div>

            <div class="form-group">
                <label>عنوان القصيدة</label>
                <input type="text" id="poemTitle" placeholder="أدخل عنوان القصيدة">
            </div>

            <div class="form-group">
                <label>الشاعر</label>
                <input type="text" id="poemAuthor" placeholder="أدخل اسم الشاعر">
            </div>

            <div class="form-group">
                <label>النوع</label>
                <select id="poemCategory">
                    <option value="حب">حب</option>
                    <option value="فخر">فخر</option>
                    <option value="حكمة">حكمة</option>
                    <option value="حنين">حنين</option>
                    <option value="أخرى">أخرى</option>
                </select>
            </div>

            <div class="form-group">
                <label>متن القصيدة</label>
                <textarea id="poemContent" placeholder="أدخل متن القصيدة (كل بيت في سطر منفصل)"></textarea>
            </div>

            <div class="form-buttons">
                <button class="btn btn-save" onclick="savePoem()">حفظ القصيدة</button>
                <button class="btn btn-cancel" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // تحميل القصائد من LocalStorage
        function loadPoems() {
            const poems = JSON.parse(localStorage.getItem('poems')) || [];
            return poems;
        }

        // حفظ القصائد في LocalStorage
        function savePoems(poems) {
            localStorage.setItem('poems', JSON.stringify(poems));
        }

        // إضافة قصيدة جديدة
        function savePoem() {
            const title = document.getElementById('poemTitle').value.trim();
            const author = document.getElementById('poemAuthor').value.trim();
            const category = document.getElementById('poemCategory').value;
            const content = document.getElementById('poemContent').value.trim();

            if (!title || !author || !content) {
                alert('الرجاء ملء جميع الحقول');
                return;
            }

            const poem = {
                id: Date.now(),
                title,
                author,
                category,
                content,
                date: new Date().toLocaleDateString('ar-SA')
            };

            const poems = loadPoems();
            poems.unshift(poem);
            savePoems(poems);

            clearForm();
            closeModal();
            displayPoems();
        }

        // عرض جميع القصائد
        function displayPoems() {
            const poems = loadPoems();
            const grid = document.getElementById('poemsGrid');
            const emptyState = document.getElementById('emptyState');

            if (poems.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                updateStats(0, 0);
                return;
            }

            emptyState.style.display = 'none';
            grid.innerHTML = poems.map(poem => `
                <div class="poem-card">
                    <div class="poem-title">${poem.title}</div>
                    <div class="poem-poet">للشاعر: ${poem.author}</div>
                    <div class="poem-content" id="content-${poem.id}">
                        ${poem.content.split('\n').map(line => `<div>${line}</div>`).join('')}
                    </div>
                    <div class="read-more" onclick="toggleReadMore(${poem.id})">قراءة المزيد</div>
                    <div class="poem-meta">
                        <span class="poem-category">${poem.category}</span>
                        <span>${poem.date}</span>
                        <button style="background: #ff6b6b; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;" onclick="deletePoem(${poem.id})">حذف</button>
                    </div>
                </div>
            `).join('');

            // تحديث الإحصائيات
            const totalVerses = poems.reduce((sum, p) => sum + p.content.split('\n').filter(l => l.trim()).length, 0);
            updateStats(poems.length, totalVerses);
        }

        // تبديل قراءة المزيد
        function toggleReadMore(poemId) {
            const content = document.getElementById(`content-${poemId}`);
            content.classList.toggle('expanded');
            event.target.textContent = content.classList.contains('expanded') ? 'إخفاء' : 'قراءة المزيد';
        }

        // حذف قصيدة
        function deletePoem(poemId) {
            if (confirm('هل تريد حذف هذه القصيدة؟')) {
                let poems = loadPoems();
                poems = poems.filter(p => p.id !== poemId);
                savePoems(poems);
                displayPoems();
            }
        }

        // فتح النموذج
        function openModal() {
            document.getElementById('poemModal').classList.add('active');
        }

        // إغلاق النموذج
        function closeModal() {
            document.getElementById('poemModal').classList.remove('active');
            clearForm();
        }

        // مسح النموذج
        function clearForm() {
            document.getElementById('poemTitle').value = '';
            document.getElementById('poemAuthor').value = '';
            document.getElementById('poemContent').value = '';
            document.getElementById('poemCategory').value = 'حب';
        }

        // تحديث الإحصائيات
        function updateStats(poemCount, verseCount) {
            document.getElementById('poemCount').textContent = poemCount;
            document.getElementById('verseCount').textContent = verseCount;
        }

        // إغلاق النموذج عند الضغط خارجه
        document.getElementById('poemModal').addEventListener('click', (e) => {
            if (e.target.id === 'poemModal') {
                closeModal();
            }
        });

        // تحميل القصائد عند فتح الصفحة
        displayPoems();

        // إضافة بعض القصائد التجريبية
        function addSamplePoems() {
            const samples = [
                {
                    title: 'القمر يتحدث',
                    author: 'أحمد شوقي',
                    category: 'حب',
                    content: 'يا ليل الصبح يأتي فيك ما يأتي\nويا صبح الليل يغشاك يغشاني\nأراك بعيدة والقرب يقتلني\nويا قمر السما هل تشعرين بدعائي'
                },
                {
                    title: 'الحكمة في الحياة',
                    author: 'الحكيم',
                    category: 'حكمة',
                    content: 'الحياة تعلمنا الصبر كل يوم\nوتعطينا الدروس بلا توقف\nفمن صبر على البلاء نال المراد\nومن حكم في أموره نال النجاح'
                }
            ];

            let poems = loadPoems();
            if (poems.length === 0) {
                samples.forEach(sample => {
                    poems.push({
                        id: Date.now() + Math.random(),
                        ...sample,
                        date: new Date().toLocaleDateString('ar-SA')
                    });
                });
                savePoems(poems);
                displayPoems();
            }
        }

        // إضافة النماذج التجريبية عند أول زيارة
        addSamplePoems();
    </script>
</body>
</html>
